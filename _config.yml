# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 柚木鉉の空間
subtitle: "Ne me plaignez pas C'est pour cela que je suis née"
description: GloomyGhost Blog - Singing Voice Synthesis | Operating System | Web Develop | IoT
keywords: GloomyGhost, C++, CPP, JavaScript, Web, Blog
author: 柚木 鉉
language: zh-CN
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://gloomyghost.com
permalink: posts/:title.aspx
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: false
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: true
prismjs:
  preprocess: true
  line_number: false
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: endspace

# Search (hexo-generator-search)
search:
  path: search.xml
  field: post
  content: true
  format: html

# Marked renderer: enable heading IDs so client-side TOC scrollspy works
marked:
  headerIds: true
  prependRoot: true
  postAsset: false

# Feed (hexo-generator-feed)
feed:
  type: atom
  path: atom.xml
  limit: 20

# Deployment
deploy:
  type: ''
